<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Опрос для гостей | Свадьба Михаила и Юлии</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ===== ГЛАВНЫЙ ЭКРАН ОПРОСА ===== -->
    <section class="poll-hero">
        <div class="poll-hero-content">
            <a href="index.html" class="btn-back">← Вернуться на главную</a>
            <h1 class="poll-hero-title">🍷 Опрос для гостей</h1>
            <p class="poll-hero-subtitle">
                Помогите нам организовать идеальный праздник!<br />
                Ответьте на несколько вопросов — это займёт всего минуту ✨
            </p>
        </div>
    </section>

    <!-- ===== ФОРМА ОПРОСА ===== -->
    <section class="poll-section">
        <div class="poll-container">
            <form id="pollForm">
                
                <!-- Вопрос 1: Имя -->
                <div class="poll-question">
                    <label for="pollName">Ваше имя *</label>
                    <input type="text" id="pollName" placeholder="Например: Иван Петров" required />
                </div>
                
                <!-- Вопрос 2: Предпочитаемый алкоголь -->
                <div class="poll-question">
                    <label>Какой алкоголь предпочитаете? <span class="hint">(можно выбрать несколько)</span></label>
                    <div class="checkbox-group" id="alcoholGroup">
                        <label><input type="checkbox" value="Вино красное" /> 🍷 Вино красное</label>
                        <label><input type="checkbox" value="Вино белое" /> 🍷 Вино белое</label>
                        <label><input type="checkbox" value="Вино розовое" /> 🍷 Вино розовое</label>
                        <label><input type="checkbox" value="Шампанское" /> 🥂 Шампанское</label>
                        <label><input type="checkbox" value="Водка" /> 🍸 Водка</label>
                        <label><input type="checkbox" value="Коньяк" /> 🥃 Коньяк</label>
                        <label><input type="checkbox" value="Виски" /> 🥃 Виски</label>
                        <label><input type="checkbox" value="Пиво" /> 🍺 Пиво</label>
                        <label><input type="checkbox" value="Безалкогольное" /> 🧃 Безалкогольное</label>
                        <label><input type="checkbox" value="Другое" /> ✏️ Другое</label>
                    </div>
                    <input type="text" id="alcoholOther" placeholder="Если выбрали 'Другое', укажите что именно" style="margin-top: 0.5rem;" />
                </div>
                
                <!-- Вопрос 3: Аллергии -->
                <div class="poll-question">
                    <label>Есть ли у вас аллергия или непереносимость? <span class="hint">(можно выбрать несколько)</span></label>
                    <div class="checkbox-group" id="allergyGroup">
                        <label><input type="checkbox" value="Орехи" /> 🥜 Орехи</label>
                        <label><input type="checkbox" value="Молочные продукты" /> 🥛 Молочные продукты</label>
                        <label><input type="checkbox" value="Глютен" /> 🌾 Глютен</label>
                        <label><input type="checkbox" value="Морепродукты" /> 🦐 Морепродукты</label>
                        <label><input type="checkbox" value="Яйца" /> 🥚 Яйца</label>
                        <label><input type="checkbox" value="Цитрусовые" /> 🍊 Цитрусовые</label>
                        <label><input type="checkbox" value="Алкоголь" /> 🚫 Алкоголь</label>
                        <label><input type="checkbox" value="Нет аллергий" /> ✅ Нет аллергий</label>
                        <label><input type="checkbox" value="Другое" /> ✏️ Другое</label>
                    </div>
                    <input type="text" id="allergyOther" placeholder="Если выбрали 'Другое', укажите что именно" style="margin-top: 0.5rem;" />
                </div>
                
                <!-- Вопрос 4: Особые пожелания -->
                <div class="poll-question">
                    <label for="pollWishes">Особые пожелания или комментарии</label>
                    <textarea id="pollWishes" placeholder="Например: вегетарианское меню, люблю острое, не ем рыбу..."></textarea>
                </div>
                
                <button type="submit" class="btn-submit-poll">💌 Отправить ответ</button>
            </form>
            
            <div id="pollSuccessMessage" class="success-message-poll">
                ✅ Спасибо! Ваш ответ получен. Мы учтём все пожелания! 🎉
            </div>
            
            <div id="pollLoadingMessage" style="display: none; text-align: center; margin-top: 1rem; color: #7a5a4f;">
                ⏳ Отправляем ваш ответ...
            </div>
        </div>
    </section>

    <!-- ===== ПОДВАЛ ===== -->
    <footer class="footer">
        <span>С любовью</span> · Михаил &amp; Юлия · 2026
    </footer>

    <!-- ===== СКРИПТ ===== -->
    <script>
        const BOT_TOKEN = '8577554424:AAHJSaH0nqFH8IPGKooqChZh_SHrGGAaWEg';
        
        const CHAT_IDS = [
            '402311694',
            '1072868851'
        ];

        const form = document.getElementById('pollForm');
        const successMsg = document.getElementById('pollSuccessMessage');
        const loadingMsg = document.getElementById('pollLoadingMessage');
        const submitBtn = form.querySelector('.btn-submit-poll');

        function getCheckedValues(groupId) {
            const checkboxes = document.querySelectorAll(`#${groupId} input[type="checkbox"]:checked`);
            const values = [];
            checkboxes.forEach(cb => {
                if (cb.value !== 'Другое') {
                    values.push(cb.value);
                }
            });
            return values;
        }

        async function sendPollToTelegram(name, alcohol, allergy, wishes) {
            let message = `📋 <b>НОВЫЙ ОТВЕТ НА ОПРОС!</b>\n\n`;
            message += `👤 <b>Имя:</b> ${name}\n\n`;
            
            message += `🍷 <b>Предпочитаемый алкоголь:</b>\n`;
            if (alcohol.length > 0) {
                message += alcohol.map(a => `   • ${a}`).join('\n');
            } else {
                message += '   • Не указано\n';
            }
            
            message += `\n⚠️ <b>Аллергии/непереносимость:</b>\n`;
            if (allergy.length > 0) {
                message += allergy.map(a => `   • ${a}`).join('\n');
            } else {
                message += '   • Не указано\n';
            }
            
            if (wishes && wishes.trim() !== '') {
                message += `\n📝 <b>Особые пожелания:</b>\n   ${wishes}`;
            }
            
            message += `\n\n🕐 ${new Date().toLocaleString('ru-RU')}`;

            const results = [];
            for (const chatId of CHAT_IDS) {
                try {
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: chatId,
                            text: message,
                            parse_mode: 'HTML'
                        })
                    });
                    results.push({ chatId, success: response.ok });
                } catch (error) {
                    results.push({ chatId, success: false, error: error.message });
                }
            }
            return results;
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('pollName').value.trim();
            if (!name) {
                alert('Пожалуйста, напишите ваше имя :)');
                document.getElementById('pollName').focus();
                return;
            }
            
            let alcohol = getCheckedValues('alcoholGroup');
            const alcoholOther = document.getElementById('alcoholOther').value.trim();
            if (alcoholOther) {
                alcohol.push(`Другое: ${alcoholOther}`);
            }
            
            let allergy = getCheckedValues('allergyGroup');
            const allergyOther = document.getElementById('allergyOther').value.trim();
            if (allergyOther) {
                allergy.push(`Другое: ${allergyOther}`);
            }
            
            const wishes = document.getElementById('pollWishes').value.trim();
            
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            submitBtn.textContent = '⏳ Отправка...';
            loadingMsg.style.display = 'block';
            successMsg.classList.remove('show');
            
            try {
                const results = await sendPollToTelegram(name, alcohol, allergy, wishes);
                const successCount = results.filter(r => r.success).length;
                const totalCount = results.length;
                
                successMsg.textContent = `✅ Спасибо, ${name}! Ответ отправлен (${successCount}/${totalCount} получателей). Мы учтём все пожелания! 🎉`;
                successMsg.classList.add('show');
                form.reset();
                
                setTimeout(() => {
                    loadingMsg.style.display = 'none';
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('loading');
                    submitBtn.textContent = '💌 Отправить ответ';
                }, 2000);
                
                setTimeout(() => {
                    successMsg.classList.remove('show');
                }, 7000);
                
            } catch (error) {
                loadingMsg.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
                submitBtn.textContent = '💌 Отправить ответ';
                alert('❌ Ошибка отправки. Попробуйте ещё раз.');
            }
        });
    </script>
</body>
</html>
